<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <!-- Background: dark rounded square -->
  <rect width="500" height="500" rx="100" fill="#050505"/>

  <!-- Subtle inner glow rings — gives depth to the prism face -->
  <polygon points="250,72 432,382 68,382"
    fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="28" stroke-linejoin="round"/>

  <!-- Prism body — very dark fill, crisp edge -->
  <polygon points="250,72 432,382 68,382"
    fill="#0e0e0e" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Incoming white beam — enters left face, hits the prism -->
  <!-- Left face runs from (68,382) to (250,72); entry midpoint ≈ (159,227) -->
  <!-- Beam comes from far left, slightly angled downward -->
  <line x1="14" y1="212" x2="159" y2="227"
    stroke="rgba(255,255,255,0.85)" stroke-width="7" stroke-linecap="round"/>

  <!-- The beam travels through the prism to the refraction point -->
  <line x1="159" y1="227" x2="310" y2="248"
    stroke="rgba(255,255,255,0.20)" stroke-width="5" stroke-linecap="round"/>

  <!-- Spectrum rays — fan out from the right face -->
  <!-- Right face runs from (250,72) to (432,382); exit midpoint ≈ (341,227) -->

  <!-- Purple ray — bends upward most -->
  <line x1="310" y1="248" x2="492" y2="138"
    stroke="#c084fc" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- Cyan ray — bends slightly upward -->
  <line x1="310" y1="248" x2="492" y2="218"
    stroke="#22d3ee" stroke-width="7" stroke-linecap="round" opacity="0.95"/>

  <!-- Emerald ray — exits roughly horizontal -->
  <line x1="310" y1="248" x2="492" y2="302"
    stroke="#10b981" stroke-width="7" stroke-linecap="round" opacity="0.90"/>

  <!-- Amber ray — bends downward -->
  <line x1="310" y1="248" x2="492" y2="386"
    stroke="#f59e0b" stroke-width="6" stroke-linecap="round" opacity="0.80"/>

  <!-- Refraction point — small bright dot where beam splits inside prism -->
  <circle cx="310" cy="248" r="5" fill="rgba(255,255,255,0.6)"/>

  <!-- Entry point — subtle dot -->
  <circle cx="159" cy="227" r="4" fill="rgba(255,255,255,0.35)"/>
</svg>
